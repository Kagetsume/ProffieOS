# =============================================================================
# config/features.ini - Feature toggles (gesture, twist)
# =============================================================================
# Copy this file to the root of your SD card as:  config/features.ini
#
# This file is read AFTER config/board.ini. Only gesture, twist_on, and
# twist_off are read here; they OVERRIDE the same values from board.ini.
# Use this for contest-specific setups: e.g. disable twist-off for a contest
# by dropping in this file without changing board.ini (hardware stays the same).
# =============================================================================

# ---- Gesture ignition (swing/thrust/twist to ignite) ----
gesture = on

# ---- Twist to turn on ----
twist_on = on

# ---- Twist to turn off ----
# Example: set to "off" for a contest where twist-off is not allowed.
twist_off = on
