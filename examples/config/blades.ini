# =============================================================================
# config/blades.ini - Blade wiring (data pin, pixels, power pins)
# =============================================================================
# Copy this file to the root of your SD card as:  config/blades.ini
#
# When present and valid, this REPLACES the compiled blade configuration at
# runtime (on supported platforms, e.g. Proffieboard with WS2811). Each blade
# is defined by: blade=<index>, then data_pin=, pixels=, power_pin= (or
# power_pin1..power_pin6). End with "end".
#
# Pin values can be numbers (e.g. 20) or board pin names (e.g. bladePowerPin1)
# if your config defines them. Up to 16 blades; up to 6 power pins per blade.
# =============================================================================

# ---- Blade 0: main blade ----
# data_pin = LED data pin (use bladePin, blade2Pin, etc. from your board config)
# pixels   = number of LEDs (1-65535)
# power_pin / power_pin1..6 = FET/power pin(s) (bladePowerPin1, bladePowerPin2, etc.)
# sub_blade = first, last (optional) - split strip into segments; up to 8 per blade
blade = 0
data_pin = bladePin
pixels = 144
power_pin = bladePowerPin1
# sub_blade = 0, 99
# sub_blade = 100, 143

# ---- Blade 1: second strip (example) ----
blade = 1
data_pin = blade2Pin
pixels = 60
power_pin1 = bladePowerPin2
power_pin2 = bladePowerPin3

# ---- Required: end of blade definitions ----
end
