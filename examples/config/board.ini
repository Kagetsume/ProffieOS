# =============================================================================
# config/board.ini - Board hardware configuration
# =============================================================================
# Copy this file to the root of your SD card as:  config/board.ini
# The firmware reads it at startup (when SD is enabled) to set hardware and
# optional feature options without recompiling.
#
# Put HARDWARE here: button count, OLED, Bluetooth. Optionally gesture/twist
# (those can also go in config/features.ini so contest-only overrides are easy).
# =============================================================================

# ---- Button count (1, 2, or 3) ----
# Must match or be less than NUM_BUTTONS in your compiled config.
buttons = 2

# ---- OLED display ----
# on = use display (if compiled in); off = disable at runtime.
oled = on

# ---- Bluetooth serial (Serial3) ----
# Only used when the firmware is built with ENABLE_SERIAL.
# on = start Serial3 for BT serial commands; off = do not start Serial3.
bluetooth = on

# ---- Optional: gesture and twist (can also be in config/features.ini) ----
# If config/features.ini exists, its gesture/twist values override these.
# gesture  = swing/thrust/twist ignition (gesture on)
# twist_on = twist to turn the saber on
# twist_off = twist to turn the saber off
gesture = on
twist_on = on
twist_off = on
