# =============================================================================
# config/blade_styles.ini - Named style "recipes" (layers of effects)
# =============================================================================
# Firmware: in ProffieOS.ino set  #define CONFIG_FILE "config/config-files-config.h"
#           (see config/config-files-config.h for SD INI layout + fallbacks).
# Copy to SD:  config/blade_styles.ini  (same folder as config/presets.ini)
#
# HOW IT WORKS:
#   In presets.ini, use  style = config <section_name>  to load a section from
#   this file. Each section defines one or more layers that are composited in
#   order (bottom to top, like Photoshop layers). The first layer is the base;
#   each subsequent layer is drawn on top.
#
# LAYER FORMAT:
#   layer = <style_name> <args>
#       Creates a layer from a named style (standard, fire, rainbow, etc.).
#       The style is rendered as a full blade, then composited onto the stack.
#
#   layer = <blend> opacity <0-32768> <style_name> <args>
#       Same, but with a blend mode and/or opacity applied before compositing.
#       Blend modes: normal (default), multiply, screen, add.
#       Opacity: 0 = fully transparent, 32768 = fully opaque.
#
#   layer = config <other_section>
#       Nests another section's layers into this one (recursive composition).
#
# BLEND MODE GUIDE:
#   normal   — standard alpha-over: overlay replaces base where opaque.
#   add      — overlay color is added to base (brightens, good for flashes).
#   screen   — like add but won't clip to white as harshly (good for glows).
#   multiply — overlay darkens base (black=full dim, white=no change).
#              Great for masks: a grayscale overlay controls base brightness.
#
# IMPORTANT: Full blade styles (standard, fire, rainbow, unstable, strobe,
#   cycle, advanced) produce OPAQUE output. Without a blend mode + opacity,
#   they will completely cover layers below them. The "blast" style is the
#   exception — it's transparent until a blast event occurs.
#
# VARIABLES:
#   Define variables in a section (name = value), then use {{name}} in layers.
#   Presets can override variables: style = config section base=red clash=blue
#
# PALETTES:
#   [palette_<id>] sections define reusable variable sets.
#   Use "palette = <id>" in a section to import those variables.
#
# STRUCTURED LAYERS:
#   layer.<style>.<slot> = value  is an alternative to the single-line format.
#   Slot names match the style's argument order (see examples below).
#
# INCLUDES:
#   include = path/to/file.ini  merges another file's layers into the section.
#   Top-level include (outside any section) loads palette sections from that file.
#
# NAMED STYLE QUICK REFERENCE (args in order):
#   standard <color> <clash_color> <extend_ms> <retract_ms>
#       Solid blade with clash flash, lockup, blast, and extension/retraction.
#   fire <warm_color> <hot_color>
#       Rolling flame effect. Heat propagates along the blade creating
#       organic bright/dark zones. No extension animation — flames grow.
#   rainbow <extend_ms> <retract_ms>
#       Hue-cycling rainbow blade with clash, lockup, and extension/retraction.
#   unstable <warm> <warmer> <hot> <sparks> <extend_ms> <retract_ms>
#       Crackling blade with BrownNoiseFlicker, strobe, AudioFlicker lockup,
#       clash, blast, and OnSpark. All args optional (good defaults).
#   strobe <standby_color> <flash_color> <freq_hz> <flash_ms> [ext] [ret]
#       Alternates between standby and flash colors at the given frequency.
#   blast <color>
#       Transparent overlay — invisible until a blast event, then flashes.
#       The only built-in style safe to use as a layer without blend modes.
#   cycle <start> <base> <flicker> <blast_color> <lockup_color>
#       Color-cycling blade with AudioFlicker, blast, lockup, and clash.
#   advanced <hilt> <mid> <tip> <spark> <spark_ms> <blast> <lockup> <clash>
#            <ext> <ret> <spark_tip>
#       Gradient blade with OnSpark, AudioFlicker lockup, and InOutSparkTip.
#
# PREON / POSTOFF STYLES (transparent transition layers):
#   preon_glow <color> <fade_in_ms> <fade_out_ms>
#       Pre-ignition glow: fades color in, holds briefly, fades out.
#       Triggered by EFFECT_PREON (fires when the user presses "on",
#       BEFORE the main blade ignition animation starts).
#       Example: preon_glow blue 500 500  →  blue pulse over 1 second.
#
#   preon_wipe <color> <wipe_ms> <fade_out_ms>
#       Pre-ignition wipe: sweeps color from hilt to tip, then fades.
#       Triggered by EFFECT_PREON. The wipe previews the blade direction
#       before the main extension begins.
#       Example: preon_wipe green 1000 500  →  green wipe over 1s, fade 0.5s.
#
#   postoff_glow <color> <fade_in_ms> <fade_out_ms>
#       Post-retraction glow: fades color in quickly, then slowly fades out.
#       Triggered by EFFECT_POSTOFF (fires after the blade has fully
#       retracted). Creates a lingering ember / afterglow effect.
#       Example: postoff_glow red 100 2000  →  quick red flash, 2s fade.
#
#   postoff_wipe <color> <fade_in_ms> <wipe_ms>
#       Post-retraction wipe: fades color in, then wipes from tip to hilt.
#       Triggered by EFFECT_POSTOFF. Creates a "draining" effect as if
#       residual energy is pulled back into the hilt after shutdown.
#       Example: postoff_wipe white 100 1000  →  white flash, 1s drain.
#
#   HOW PREON/POSTOFF WORK:
#     These styles are TRANSPARENT during normal operation — they produce
#     no output when the blade is on or off. They only activate when their
#     trigger event fires (EFFECT_PREON or EFFECT_POSTOFF). The transition
#     plays once and returns to transparent.
#
#     Add them as regular layers in any section. No blend mode or opacity
#     is needed (they handle transparency internally). You can combine
#     multiple preon/postoff layers, or mix them with any other layers.
#
#     TIMING:
#       Preon plays BEFORE ignition: button press → preon animation →
#       then the main blade extends. The preon sound (if the font has one
#       in the "preon" folder) plays simultaneously.
#       Postoff plays AFTER retraction: blade fully retracts → postoff
#       animation plays on the dark blade → blade powers off.
#
#     POWER MANAGEMENT:
#       The blade LEDs must stay powered during preon/postoff even though
#       the main blade style says "off". The firmware handles this
#       automatically — TransitionEffectConfigL signals the blade to stay
#       powered while its transition is running, and ConfigLayersStyle's
#       AllowDisableCapture prevents other layers from powering off the
#       LEDs prematurely.
#
#     PREON/POSTOFF SOUND FILES:
#       If your font folder contains a "preon" subfolder with WAV files,
#       one is played when EFFECT_PREON fires. Similarly, "postoff" WAV
#       files play on EFFECT_POSTOFF. Match your animation timing to
#       the sound duration for the best effect.
# =============================================================================

# Optional: extra palette sections from config/blade_styles/palettes_extra.ini
# (if this file doesn't exist on the SD card, the include is silently skipped)
include = blade_styles/palettes_extra.ini

# =============================================================================
# BASIC EXAMPLES — single and multi-layer styles
# =============================================================================

# ---- [plain_rainbow]: Single layer ----
# The simplest possible section: one rainbow blade with 300ms extension
# and 800ms retraction. Includes built-in clash, lockup, and blast.
[plain_rainbow]
layer = rainbow 300 800

# ---- [rainbow_strobe]: Two layers with blend mode ----
# Rainbow base with white strobe pulses overlaid. The strobe is a full
# opaque style, so we use ADD blend + opacity to let the rainbow show
# through. Without "add opacity", the strobe would completely hide the
# rainbow. ADD means the strobe's white flashes BRIGHTEN the rainbow.
# Opacity 16000 (~49%) keeps the pulses from being too overwhelming.
# Args: strobe standby=black, flash=white, freq=15 Hz, pulse=1 ms,
#        extend=300 ms, retract=800 ms.
[rainbow_strobe]
layer = rainbow 300 800
layer = add opacity 16000 strobe black white 15 1 300 800

# ---- [fire_blast]: Fire base + transparent blast overlay ----
# Fire is the base layer (opaque, rolling flame animation). The blast
# layer uses BlastL which is TRANSPARENT until a blast event — so the
# fire shows through normally, and white flashes appear on blast.
# This is the correct way to add blast to a fire blade: blast is the
# one built-in style that works as a layer without needing blend modes.
# Args: fire warm=red hot=yellow; blast color=white.
[fire_blast]
layer = fire red yellow
layer = blast white 200 100 400

# ---- [complex]: Three layers — rainbow + blast + strobe ----
# Rainbow base, then a transparent blast overlay, then a strobe in ADD
# blend. The blast is transparent (no blend needed). The strobe needs
# ADD + opacity since it's opaque. The three layers stack: you see a
# rainbow blade that flashes white on blast and pulses cyan periodically.
[complex]
layer = rainbow 300 800
layer = blast white 200 100 400
layer = add opacity 16000 strobe black cyan 20 1 300 800

# =============================================================================
# VARIABLES — reuse colors/values, override from presets
# =============================================================================

# ---- [with_vars]: Section-local variables ----
# Variables are defined as  name = value  and referenced as {{name}} in layers.
# Defaults here: cyan blade, white clash, 300/800 ms extension/retraction.
# Presets can override any variable:
#   style = config with_vars base=magenta           -> magenta blade
#   style = config with_vars base=blue clash=yellow  -> blue blade, yellow clash
# The "version = N" line is reserved for future migrations and is not a variable.
[with_vars]
version = 1
base = cyan
clash = white
ext = 300
ret = 800
layer = standard {{base}} {{clash}} {{ext}} {{ret}}
layer = blast white 200 100 400

# =============================================================================
# PALETTES — shared variable sets across sections
# =============================================================================

# ---- [palette_default]: Named palette (shared variables) ----
# A [palette_<id>] section defines variables that other sections can import
# with "palette = <id>". This lets multiple sections share the same color
# scheme without duplicating the definitions.
[palette_default]
base = cyan
clash = white
ext = 300
ret = 800

# ---- [with_palette]: Uses the "default" palette ----
# "palette = default" imports all variables from [palette_default] above.
# The layer then uses {{base}}, {{clash}}, etc. from that palette.
# Result: identical to [with_vars] with its default values.
[with_palette]
palette = default
layer = standard {{base}} {{clash}} {{ext}} {{ret}}

# =============================================================================
# INCLUDES — merge layers or palettes from external files
# =============================================================================

# ---- [rainbow_strobe_included]: Include a fragment file ----
# The rainbow layer is defined here; the strobe overlay is loaded from
# config/blade_styles/strobe_overlay.ini and merged into this section.
# This is useful for sharing common overlays across many sections.
[rainbow_strobe_included]
layer = rainbow 300 800
include = blade_styles/strobe_overlay.ini

# ---- [with_palette_alt]: Palette from an included file ----
# The "alt" palette is defined in config/blade_styles/palettes_extra.ini
# (loaded by the top-level include at the start of this file). This
# section imports those variables and uses them in a standard blade layer.
[with_palette_alt]
palette = alt
layer = standard {{base}} {{clash}} {{ext}} {{ret}}

# =============================================================================
# STRUCTURED LAYERS — key-per-slot alternative to single-line format
# =============================================================================

# ---- [structured_standard]: Structured key format ----
# Instead of  layer = standard cyan white 300 800  you can set each argument
# individually with  layer.<style>.<slot> = value. Slot names for "standard"
# are: base, clash, ext, ret. This is more readable for styles with many args.
# Result is identical to: layer = standard cyan white 300 800
[structured_standard]
layer.standard.base = cyan
layer.standard.clash = white
layer.standard.ext = 300
layer.standard.ret = 800

# ---- [structured_fire]: Structured fire style ----
# Slot names for "fire" are: warm, hot.
# Result is identical to: layer = fire orange red
[structured_fire]
layer.fire.warm = orange
layer.fire.hot = red

# ---- [structured_strobe]: Structured strobe style ----
# Slot names for "strobe" are: standby, flash, freq, flash_ms, ext, ret.
# Result is identical to: layer = strobe black white 18 1 300 800
[structured_strobe]
layer.strobe.standby = black
layer.strobe.flash = white
layer.strobe.freq = 18
layer.strobe.flash_ms = 1
layer.strobe.ext = 300
layer.strobe.ret = 800

# =============================================================================
# BLEND MODES AND OPACITY — controlling how layers combine
# =============================================================================

# ---- [rainbow_faint_strobe]: Opacity only (default normal blend) ----
# No blend keyword = normal (alpha-over). Opacity 12000 (~37%) makes the
# strobe semi-transparent. During strobe flashes, you see a dim white over
# rainbow. During strobe standby (black), you see dim black over rainbow.
# Because normal blend REPLACES, even the black standby phase affects the
# rainbow — dimming it slightly. Compare with ADD below.
[rainbow_faint_strobe]
layer = rainbow 300 800
layer = opacity 12000 strobe black white 15 1 300 800

# ---- [rainbow_multiply_strobe]: Multiply blend ----
# MULTIPLY: each pixel = (base * overlay) / max.
# White overlay → base unchanged. Black overlay → base goes dark.
# The strobe alternates between black (darkens rainbow) and white
# (preserves rainbow). Opacity 20000 (~61%) softens the darkening.
# Result: rainbow that periodically dims to ~39% brightness.
[rainbow_multiply_strobe]
layer = rainbow 300 800
layer = multiply opacity 20000 strobe black white 15 1 300 800

# ---- [rainbow_screen_blast]: Screen blend ----
# SCREEN: each pixel = base + overlay - (base * overlay / max).
# Always brightens or preserves. Black overlay → no change.
# White overlay → approaches white. Softer than ADD (won't clip as hard).
# Result: rainbow with soft white glow when blast fires.
[rainbow_screen_blast]
layer = rainbow 300 800
layer = screen opacity 22000 blast white 200 100 400

# ---- [rainbow_add_strobe]: Add blend ----
# ADD: each pixel = min(base + overlay, max).
# Black overlay → no change (adding zero). White overlay → clipped white.
# Best for bright flashes on top of a base: the strobe's black standby
# phase adds nothing (rainbow shows through), and the white flash phase
# adds bright cyan pulses. Opacity 18000 (~55%) controls flash intensity.
[rainbow_add_strobe]
layer = rainbow 300 800
layer = add opacity 18000 strobe black cyan 22 1 300 800

# ---- [rainbow_normal_explicit]: Explicit "normal" keyword ----
# Same as omitting the blend keyword entirely. Documents that "normal" can
# be written explicitly before "opacity" for clarity.
[rainbow_normal_explicit]
layer = rainbow 300 800
layer = normal opacity 15000 strobe black white 15 1 300 800

# =============================================================================
# NESTED CONFIGS — composing sections from other sections
# =============================================================================

# ---- [base_rainbow_blast]: Helper section (used by nested_config_demo) ----
# A simple two-layer style: rainbow base with blast overlay. This section
# exists to be referenced by [nested_config_demo] below.
[base_rainbow_blast]
layer = rainbow 300 800
layer = blast white 200 100 400

# ---- [nested_config_demo]: Nested section reference ----
# "layer = config base_rainbow_blast" expands [base_rainbow_blast]'s layers
# (rainbow + blast) into this section as a single composite sub-style.
# Then a strobe is added on top with ADD blend. The final result has three
# effective layers (rainbow, blast, strobe) built from two sections.
# This is useful for building complex styles from reusable building blocks.
[nested_config_demo]
layer = config base_rainbow_blast
layer = add opacity 16000 strobe black white 15 1 300 800

# =============================================================================
# COMPLEX PRESETS — advanced multi-layer compositions
# =============================================================================

# ---- [chaos_inferno]: 6-layer unstable fire blade ----
# A chaotic, aggressive blade combining multiple effects. The unstable base
# provides the primary crackling visual with built-in clash/lockup/blast.
# Additional layers add fire warmth, rainbow color shifting, extra blast
# intensity, electric strobe pulses, and audio-reactive shimmer.
#
# VISUAL RESULT: A flickering, crackling red/orange blade with shifting
# rainbow tints, periodic cyan flashes, and a faint blue audio-reactive
# glow. Clash triggers the unstable's LocalizedClash. Blast triggers both
# the unstable's built-in blast AND the extra blast layer for a double hit.
[chaos_inferno]
# Layer 1 — Unstable base (opaque, normal blend)
#   BrownNoiseFlicker + Strobe create the crackling unstable look.
#   Built-in: LocalizedClash, Lockup with AudioFlicker, Blast, OnSpark.
#   This is the primary blade visual — everything else layers on top.
layer = unstable
# Layer 2 — Fire undertone (screen blend, ~30% opacity)
#   A red/yellow fire in SCREEN blend brightens the unstable base with
#   warm, organic rolling flame patterns. Low opacity keeps it subtle —
#   the fire adds warmth without overpowering the crackling effect.
layer = screen opacity 10000 fire red yellow
# Layer 3 — Rainbow color shift (screen blend, ~18% opacity)
#   A rainbow blade in SCREEN blend adds slowly cycling hue tints.
#   Very low opacity — just enough to notice shifting color undertones
#   without turning the blade into a full rainbow.
layer = screen opacity 6000 rainbow 300 800
# Layer 4 — Extra blast flash (transparent, normal blend, full opacity)
#   BlastL is transparent until a blast event. When triggered, it adds a
#   white flash ON TOP of the unstable's own blast for a brighter double hit.
layer = blast white
# Layer 5 — Cyan strobe pulses (add blend, ~15% opacity)
#   A strobe in ADD blend fires periodic cyan flashes. ADD with black
#   standby means the strobe is invisible between pulses (adding black
#   = adding nothing). The cyan flashes add electric energy.
#   18 Hz frequency, 1 ms pulse width.
layer = add opacity 5000 strobe black cyan 18 1 300 800
# Layer 6 — Blue audio shimmer (add blend, ~12% opacity)
#   A standard blue blade at very low opacity in ADD blend. The standard
#   style includes AudioFlicker in its lockup and SimpleClash, which react
#   to sound and impacts. At 12% opacity, this adds a faint blue glow that
#   subtly shifts with the hum frequency and brightens on clash.
layer = add opacity 4000 standard blue white 300 800

# =============================================================================
# PREON / POSTOFF EFFECTS — pre-ignition and post-retraction animations
# =============================================================================
#
# Preon and postoff layers add visual effects to the blade BEFORE ignition
# and AFTER retraction. They are transparent during normal blade operation
# and only activate on their trigger events.
#
# FULL SEQUENCE (with preon + postoff):
#   1. User presses "on"
#   2. EFFECT_PREON fires → preon layer activates (e.g. blue glow pulse)
#      Preon sound plays (if font has preon/ folder with WAV files)
#   3. Preon animation finishes → main blade ignites (extension animation)
#   4. Saber is ON — preon/postoff layers are fully transparent (invisible)
#      Normal blade operation: clash, lockup, blast all work as usual
#   5. User presses "off"
#   6. Main blade retracts (retraction animation)
#   7. Blade is fully retracted → EFFECT_POSTOFF fires
#   8. Postoff layer activates (e.g. red ember fade)
#   9. Postoff animation finishes → blade LEDs power off
#
# USAGE:
#   Just add preon/postoff styles as regular layers. No blend mode or
#   opacity is needed — they handle their own transparency. You can use
#   any combination: just preon, just postoff, both, or multiple of each.
#   They work alongside any other layers (standard, fire, blast, etc.).
#
# AVAILABLE PREON/POSTOFF STYLES:
#   preon_glow <color> <fade_in_ms> <fade_out_ms>
#       Pulses: fades color in over fade_in_ms, then out over fade_out_ms.
#   preon_wipe <color> <wipe_ms> <fade_out_ms>
#       Sweeps: wipes color hilt→tip over wipe_ms, then fades over fade_out_ms.
#   postoff_glow <color> <fade_in_ms> <fade_out_ms>
#       Embers: fades color in over fade_in_ms, then slowly out over fade_out_ms.
#   postoff_wipe <color> <fade_in_ms> <wipe_ms>
#       Drain: fades color in over fade_in_ms, then wipes tip→hilt over wipe_ms.
#
# TIPS:
#   - Match preon animation time to your font's preon sound duration.
#   - Preon colors don't need to match the main blade color — contrasting
#     colors (e.g. blue preon on a red blade) create dramatic effects.
#   - Postoff fade_out_ms controls how long the embers linger. Longer
#     values (2000-4000ms) look like cooling embers; shorter values
#     (200-500ms) feel like a quick energy flash.
#   - You can stack multiple preon layers for complex startup sequences
#     (they all trigger simultaneously on EFFECT_PREON).

# ---- [mystic_awakening]: Preon glow + postoff glow demo ----
# The simplest preon/postoff example: a standard blade with a blue preon
# pulse before ignition and red embers after retraction.
#
# TIMELINE:
#   Button press → blue glow fades in (500ms) then out (500ms) →
#   cyan blade extends (300ms) → normal operation → blade retracts (800ms)
#   → red flash (100ms) then slow 2-second fade to black → LEDs off.
#
# The preon and postoff layers are completely invisible during normal
# blade-on operation. The blast layer is also transparent until triggered.
[mystic_awakening]
# Layer 1 — Main blade (opaque, normal blend)
#   Standard cyan blade with white clash, 300ms extend, 800ms retract.
#   This is the primary blade visual. All other layers are transparent
#   overlays that only activate on specific events.
layer = standard cyan white 300 800
# Layer 2 — Blast overlay (transparent until blast event)
#   White flash when a blast effect is triggered. Transparent otherwise,
#   so the cyan blade shows through at all times except during blast.
layer = blast white
# Layer 3 — Pre-ignition glow (transparent until EFFECT_PREON)
#   preon_glow: fades blue in over 500ms, then fades out over 500ms.
#   This plays on the DARK blade BEFORE the standard blade's 300ms
#   extension animation starts. Total preon animation: ~1 second.
#   The blade LEDs stay powered during this transition even though
#   the main blade layer is "off" (TransitionEffectConfigL blocks
#   the blade's power-off logic while the transition runs).
layer = preon_glow blue 500 500
# Layer 4 — Post-retraction ember (transparent until EFFECT_POSTOFF)
#   postoff_glow: fades red in quickly (100ms), then slowly fades out
#   over 2000ms. This plays AFTER the blade has fully retracted.
#   The slow fade simulates cooling embers / residual heat in the
#   crystal chamber. Total postoff animation: ~2.1 seconds.
layer = postoff_glow red 100 2000

# ---- [spectral_gate]: Preon wipe + postoff wipe demo ----
# A more dramatic preon/postoff using wipe effects instead of glows.
# The preon sweeps green from hilt to tip (previewing the blade path),
# then the main green blade ignites normally. On shutdown, after
# retraction, white energy drains from tip back to hilt.
#
# TIMELINE:
#   Button press → green wipe hilt→tip (800ms) then fades (400ms) →
#   green blade extends (300ms) → normal operation → blade retracts
#   (800ms) → white flash (100ms) then white wipe tip→hilt (1200ms)
#   → LEDs off.
[spectral_gate]
# Layer 1 — Main green blade
layer = standard green white 300 800
# Layer 2 — Blast overlay
layer = blast white
# Layer 3 — Pre-ignition wipe (transparent until EFFECT_PREON)
#   preon_wipe: sweeps green from hilt to tip over 800ms, then the
#   green wipe fades out over 400ms. The wipe previews the blade
#   direction — the same path the main blade will extend along.
#   Using the same color as the main blade (green) makes the preon
#   feel like a "charging up" preview of the full ignition.
layer = preon_wipe green 800 400
# Layer 4 — Post-retraction drain (transparent until EFFECT_POSTOFF)
#   postoff_wipe: white flash (100ms fade in), then wipes from tip
#   back to hilt over 1200ms. Looks like residual energy being
#   drawn back down into the hilt after the blade shuts off.
#   The tip→hilt direction (opposite of normal extension) reinforces
#   the "powering down" visual.
layer = postoff_wipe white 100 1200

# ---- [inferno_ritual]: Fire blade with preon + postoff ----
# Combines fire (no built-in extension animation) with preon/postoff.
# The preon creates a brief orange pulse (like a pilot light igniting),
# the fire blade burns, and postoff leaves red embers that slowly cool.
# Fire is opaque and doesn't have on/off transitions itself, so the
# preon/postoff layers add the "startup" and "cooldown" bookends.
#
# TIMELINE:
#   Button press → orange pulse (300ms in, 600ms out) → fire ignites →
#   flames roll → blade off → postoff: red embers (100ms flash,
#   3000ms slow fade) → LEDs off.
[inferno_ritual]
# Layer 1 — Fire base (opaque, rolling flame animation)
layer = fire red yellow
# Layer 2 — Blast overlay
layer = blast white
# Layer 3 — Pilot light preon (EFFECT_PREON)
#   Quick orange pulse: 300ms fade in, 600ms fade out. The short
#   timing makes it feel like a gas igniter sparking before the
#   main fire catches. Orange matches the fire's warm color palette.
layer = preon_glow orange 300 600
# Layer 4 — Cooling embers postoff (EFFECT_POSTOFF)
#   Red embers: 100ms flash then very slow 3-second fade. The long
#   fade simulates coals slowly cooling after the fire goes out.
#   Red matches the fire's cool/warm end of the heat spectrum.
layer = postoff_glow red 100 3000

# ---- [smoke_laser]: Laser beam through rolling smoke ----
# Simulates a laser shining through drifting smoke. The key technique:
# fire generates a grayscale heat pattern (using white/white = no color,
# just brightness). In MULTIPLY blend, this pattern acts as a brightness
# mask — bright areas let the laser through, dark areas dim it (smoke
# blocking the beam). Two independent fire layers with different opacities
# create complex overlapping smoke patterns with parallax-like depth.
#
# VISUAL RESULT: A green laser blade with rolling darker sections that
# drift along its length, brightening and dimming organically. The smoke
# is thickest at the tip and thinnest near the hilt (fire's heat is
# strongest near the source). A faint warm glow from scattered light
# adds realism. Blast triggers a bright white flash through the haze.
[smoke_laser]
# Layer 1 — Solid green laser beam (opaque, normal blend)
#   The "laser" itself. Standard gives us a clean solid color with
#   built-in clash, lockup, blast, and extension/retraction animation.
layer = standard green white 300 800
# Layer 2 — Primary smoke mask (multiply blend, ~61% opacity)
#   fire white white = grayscale-only fire (both colors are white, so
#   the heat maps from black→white with no hue). In MULTIPLY blend:
#     - Where heat is high (white): base * white / max ≈ base (laser visible)
#     - Where heat is low (black): base * black / max ≈ black (smoke blocks)
#   Opacity 20000 limits the multiply effect so the darkest patches still
#   show ~39% of the base laser, preventing total blackout. The rolling
#   heat propagation creates the drifting smoke effect.
layer = multiply opacity 20000 fire white white
# Layer 3 — Secondary smoke wisps (multiply blend, ~37% opacity)
#   A second independent fire layer. Because each fire Style has its own
#   heat array and independent random generation, this creates a DIFFERENT
#   rolling pattern. At lower opacity, it adds subtler, finer smoke wisps
#   that overlap the primary smoke for organic, layered depth.
layer = multiply opacity 12000 fire white white
# Layer 4 — Warm light scatter (screen blend, ~9% opacity)
#   A faint orange/yellow fire in SCREEN blend simulates warm ambient
#   light scattering off the smoke particles. Very subtle — just enough
#   to add a hint of warmth to the brighter areas of the blade.
layer = screen opacity 3000 fire orange yellow
# Layer 5 — Blast flash (transparent, normal blend)
#   Bright white flash that punches through the smoke when triggered.
#   BlastL is transparent until the event, so the smoke effect is
#   uninterrupted during normal use.
layer = blast white
