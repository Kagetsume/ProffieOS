# =============================================================================
# config/blade_styles.ini - Named style "recipes" (layers of effects)
# =============================================================================
# Copy to SD:  config/blade_styles.ini  (same folder as config/presets.ini)
#
# Full format, limits, preset overrides (config <section> k=v), and style
# reference:  doc/blade_styles_config.md  and  doc/README_blade_styles_config.md
#
# This file demonstrates (section names in [brackets]):
#   [plain_rainbow]              single layer
#   [rainbow_strobe] ... [complex]   multiple plain layer = lines
#   [with_vars]                {{name}} locals + version = (reserved)
#   [palette_default] [with_palette] [with_palette_alt]   palettes + include
#   [rainbow_strobe_included]  section include = fragment
#   [structured_standard]        layer.<style>.<slot> = value
#   [structured_fire] [structured_strobe]   structured non-standard styles
#   [rainbow_faint_strobe]     opacity <0-32768>
#   [rainbow_multiply_strobe]  multiply + opacity
#   [rainbow_screen_blast]     screen + opacity
#   [rainbow_add_strobe]       add + opacity
#   [rainbow_normal_explicit]  optional keyword normal before opacity (default blend)
#   [base_rainbow_blast] [nested_config_demo]   layer = config <other_section>
# =============================================================================

# Optional: extra palette sections from config/blade_styles/palettes_extra.ini
include = blade_styles/palettes_extra.ini

# ---- Simple: one layer (plain rainbow) ----
[plain_rainbow]
layer = rainbow 300 800

# ---- Two layers: rainbow base with strobe on top ----
[rainbow_strobe]
layer = rainbow 300 800
layer = strobe black white 15 1

# ---- Fire base with white blast overlay ----
[fire_blast]
layer = fire red yellow
layer = blast white 200 100 400

# ---- Multiple layers: base then effects ----
[complex]
layer = rainbow 300 800
layer = blast white 200 100 400
layer = strobe black cyan 20 1

# ---- Example for use in presets: set style = config rainbow_strobe ----

# ---- Same-section variables (reuse colors across layers) ----
# Optional: version = N is reserved for future migrations (not a {{name}} variable).
[with_vars]
version = 1
base = cyan
clash = white
ext = 300
ret = 800
layer = standard {{base}} {{clash}} {{ext}} {{ret}}
layer = blast white 200 100 400

# ---- Named palette: [palette_<id>] then palette = <id> in an effect ----
[palette_default]
base = cyan
clash = white
ext = 300
ret = 800

[with_palette]
palette = default
layer = standard {{base}} {{clash}} {{ext}} {{ret}}

# ---- Include fragment (layers merged into this section) ----
[rainbow_strobe_included]
layer = rainbow 300 800
include = blade_styles/strobe_overlay.ini

# ---- Palette from included file (palette_alt is in palettes_extra.ini) ----
[with_palette_alt]
palette = alt
layer = standard {{base}} {{clash}} {{ext}} {{ret}}

# ---- Structured layer keys (same as: layer = standard cyan white 300 800) ----
[structured_standard]
layer.standard.base = cyan
layer.standard.clash = white
layer.standard.ext = 300
layer.standard.ret = 800

# ---- Per-layer opacity (0-32768; lower = more transparent overlay) ----
[rainbow_faint_strobe]
layer = rainbow 300 800
layer = opacity 12000 strobe black white 15 1 300 800

# ---- Blend modes: normal (default), multiply, screen, add — optional before opacity ----
[rainbow_multiply_strobe]
layer = rainbow 300 800
layer = multiply opacity 20000 strobe black white 15 1 300 800

# ---- screen / add (same pattern as multiply; optional explicit normal) ----
[rainbow_screen_blast]
layer = rainbow 300 800
layer = screen opacity 22000 blast white 200 100 400

[rainbow_add_strobe]
layer = rainbow 300 800
layer = add opacity 18000 strobe black cyan 22 1 300 800

# Same as omitting "normal" (documents optional explicit normal before opacity)
[rainbow_normal_explicit]
layer = rainbow 300 800
layer = normal opacity 15000 strobe black white 15 1 300 800

# ---- Structured layers: fire and strobe (slot names in doc/blade_styles_config.md) ----
[structured_fire]
layer.fire.warm = orange
layer.fire.hot = red

[structured_strobe]
layer.strobe.standby = black
layer.strobe.flash = white
layer.strobe.freq = 18
layer.strobe.flash_ms = 1
layer.strobe.ext = 300
layer.strobe.ret = 800

# ---- Nested config: one layer expands to another [section]'s layers ----
[base_rainbow_blast]
layer = rainbow 300 800
layer = blast white 200 100 400

[nested_config_demo]
layer = config base_rainbow_blast
layer = strobe black white 15 1 300 800
