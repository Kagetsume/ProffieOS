# =============================================================================
# config/presets.ini - Preset list (font, track, style, name)
# =============================================================================
# Copy this file to the root of your SD card as:  config/presets.ini
#
# When present and valid, this REPLACES the compiled preset list. Each preset
# is a block: new_preset, then font=, track=, style= (one per blade), name=,
# variation=, then the next new_preset or "end". Up to 64 presets.
#
# style= uses the same style strings as compiled presets (e.g. standard cyan
# white 300 800, fire red yellow). For config-driven styles from
# config/blade_styles.ini use:  style = config <section_name>
# Optional preset overrides for {{name}} in that section:
#   style = config <section_name> key=value key2=value2
# =============================================================================

# ---- Optional first line (install timestamp); can omit ----
# installed = Dec 25 2024 12:00:00

# ---- Preset 0 ----
new_preset
font = Kyber
track = tracks/hum.wav
style = standard cyan white 300 800
name = Cyan
variation = 0

# ---- Preset 1 ----
new_preset
font = Kyber
track = tracks/hum.wav
style = standard red white 300 800
name = Red
variation = 0

# ---- Preset 2 (example: use a config style from blade_styles.ini) ----
new_preset
font = Kyber
track = tracks/hum.wav
style = config rainbow_strobe
name = Rainbow Strobe
variation = 0

# ---- Preset 2b (same section [with_vars] as example, override {{base}} for this preset) ----
new_preset
font = Kyber
track = tracks/hum.wav
style = config with_vars base=magenta
name = Magenta vars
variation = 0

# ---- Preset 2c (multiple {{name}} overrides: base and clash for [with_vars]) ----
new_preset
font = Kyber
track = tracks/hum.wav
style = config with_vars base=blue clash=yellow
name = Vars multi-override
variation = 0

# ---- Preset 2d (nested config style: [nested_config_demo] in blade_styles.ini) ----
new_preset
font = Kyber
track = tracks/hum.wav
style = config nested_config_demo
name = Nested rainbow+blast+strobe
variation = 0

# ---- Preset 3 (fire) ----
new_preset
font = Kyber
track = tracks/hum.wav
style = fire red yellow
name = Fire
variation = 0

# ---- Required: end of preset list ----
end
