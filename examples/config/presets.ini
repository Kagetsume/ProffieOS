# =============================================================================
# config/presets.ini - Preset list (font, track, style, name)
# =============================================================================
# Copy to SD card as:  config/presets.ini  (folder must be named exactly "config")
#
# When present and valid, this REPLACES the compiled preset list. Each preset
# is a block: new_preset, then font=, track=, style= (one per blade), name=,
# variation=, then the next new_preset or "end". Up to 64 presets.
#
# STYLE TYPES:
#   style = <named_style> <args>
#       Uses a built-in named style directly. The first word is the style name
#       (standard, fire, rainbow, unstable, strobe, cycle, advanced, blast, config).
#       Remaining words are arguments: colors, times, etc. Use  config <section>
#       to load layered styles from config/blade_styles.ini (see below).
#
#   style = config <section_name>
#       Loads a multi-layer style from [section_name] in config/blade_styles.ini.
#       You MUST also copy blade_styles.ini to the SD card. Section names match
#       [brackets] in that file and are case-sensitive.
#       If blade_styles.ini uses "include = blade_styles/....ini", copy those too.
#
#   style = config <section_name> key=value key2=value2
#       Same as above, but overrides {{key}} variables defined in that section.
#       The section provides defaults; presets can customize colors, times, etc.
#
# NUM_BLADES 2: two style = lines per preset (one per blade strip). If you only
# wire one strip, duplicate the same style on both lines, or set NUM_BLADES 1
# in your CONFIG_FILE and use one style = line per preset.
#
# NAMED STYLE QUICK REFERENCE (args in order):
#   standard <color> <clash_color> <extend_ms> <retract_ms>
#   fire <warm_color> <hot_color>
#   rainbow <extend_ms> <retract_ms>
#   unstable [warm] [warmer] [hot] [sparks] [extend_ms] [retract_ms]
#   strobe <standby> <flash> <freq_hz> <flash_ms> [extend_ms] [retract_ms]
#   blast <color>          (transparent overlay; SD named style = color only, fixed timing in FW)
#   cycle <start> <base> <flicker> <blast> <lockup>
#   advanced <hilt> <mid> <tip> <spark> <spark_ms> <blast> <lockup> <clash>
#            <extend_ms> <retract_ms> <spark_tip>
#
# PREON / POSTOFF STYLES (transparent layers — use in blade_styles.ini):
#   preon_glow <color>       (uniform glow, brightness = sound volume)
#   preon_wipe <color>       (hilt→tip wipe over sound duration)
#   preon_sputter <color>    (blade length = sound volume)
#   postoff_glow <color>     (uniform glow, brightness = sound volume)
#   postoff_wipe <color>     (tip→hilt wipe over sound duration)
#   postoff_sputter <color>  (blade length = sound volume)
#   Duration is automatic — matches the preon/postoff sound file length.
#   Audio-reactive styles (glow, sputter) track sound volume in real time.
#   See blade_styles.ini for full documentation and layered examples.
#
# COLOR NAMES: red green blue cyan magenta yellow white black orange purple
#              pink lime teal indigo violet gold silver maroon navy olive
#              coral salmon tomato
# =============================================================================

# ---- Optional first line (install timestamp); can omit ----
# installed = Dec 25 2024 12:00:00

# ---- Preset 0: Cyan standard blade ----
# A simple solid cyan blade. "standard" gives you a single-color blade with
# white clash flashes, extension/retraction animation, and lockup effects.
# Args: base_color=cyan, clash_color=white, extend=300ms, retract=800ms.
new_preset
font = Kyber
track = tracks/hum.wav
style = standard cyan white 300 800
style = standard cyan white 300 800
name = Cyan
variation = 0

# ---- Preset 1: Red standard blade ----
# Same as Preset 0 but red. Demonstrates changing just the color argument.
new_preset
font = Kyber
track = tracks/hum.wav
style = standard red white 300 800
style = standard red white 300 800
name = Red
variation = 0

# ---- Preset 2: Rainbow + strobe from blade_styles.ini ----
# Uses "config" to load the [rainbow_strobe] section from blade_styles.ini.
# That section stacks two layers: a rainbow base with a white strobe flash
# overlaid via ADD blend at ~49% opacity. The rainbow cycles through all
# hues; the strobe adds periodic bright pulses on top.
# See [rainbow_strobe] in blade_styles.ini for the layer definitions.
new_preset
font = Kyber
track = tracks/hum.wav
style = config rainbow_strobe
style = config rainbow_strobe
name = Rainbow Strobe
variation = 0

# ---- Preset 3: Variable-driven style with preset override ----
# Uses the [with_vars] section from blade_styles.ini. That section defines
# variables like {{base}}, {{clash}}, {{ext}}, {{ret}} with default values
# (cyan, white, 300, 800). Here we OVERRIDE {{base}} to "magenta" using
# the key=value syntax after the section name.
# Result: a magenta blade with white clash (instead of the default cyan).
# The blast layer from [with_vars] is still included.
new_preset
font = Kyber
track = tracks/hum.wav
style = config with_vars base=magenta
style = config with_vars base=magenta
name = Magenta vars
variation = 0

# ---- Preset 4: Multiple variable overrides ----
# Same [with_vars] section, but this time we override BOTH {{base}} and
# {{clash}}. The section's defaults (cyan/white) are replaced with
# blue/yellow. Other variables ({{ext}}, {{ret}}) keep their defaults.
# Result: a blue blade with yellow clash flashes.
new_preset
font = Kyber
track = tracks/hum.wav
style = config with_vars base=blue clash=yellow
style = config with_vars base=blue clash=yellow
name = Vars multi-override
variation = 0

# ---- Preset 5: Nested config sections ----
# Uses [nested_config_demo] from blade_styles.ini. That section's first
# layer is "config base_rainbow_blast", which expands ANOTHER section
# ([base_rainbow_blast] = rainbow + blast). The second layer adds a
# strobe overlay in ADD blend. So the final result is three effective
# layers: rainbow base, blast overlay, and strobe pulses — built from
# two different sections composed together.
new_preset
font = Kyber
track = tracks/hum.wav
style = config nested_config_demo
style = config nested_config_demo
name = Nested rainbow+blast+strobe
variation = 0

# ---- Preset 6: Fire with blast overlay ----
# Uses [fire_blast] from blade_styles.ini: a flickering fire base
# (red→yellow heat gradient) with a white blast flash on top. The blast
# layer is transparent until you trigger a blast, so the fire shows
# through normally. When blast fires, white flashes over the flames.
new_preset
font = Kyber
track = tracks/hum.wav
style = config fire_blast
style = config fire_blast
name = Fire + blast
variation = 0

# ---- Preset 7: Direct fire style (no blade_styles.ini needed) ----
# Uses the "fire" named style directly — no config/blade_styles.ini
# required. The fire effect generates rolling heat that propagates along
# the blade: cold areas are dark, warm areas glow red, hot areas glow
# yellow, and the hottest areas flash white. The fire builds up from
# the hilt end when the saber ignites. There is no extension animation;
# the flames grow organically. Clash intensifies the fire briefly.
new_preset
font = Kyber
track = tracks/hum.wav
style = fire red yellow
style = fire red yellow
name = Fire
variation = 0

# ---- Preset 8: Chaos Inferno (6-layer complex) ----
# Uses [chaos_inferno] from blade_styles.ini: an unstable crackling base
# with fire undertones, rainbow color shifting, double blast flashes,
# cyan strobe pulses, and audio-reactive blue shimmer. Six layers
# demonstrating heavy use of blend modes (screen, add) and opacity.
# See the section comments in blade_styles.ini for per-layer details.
new_preset
font = Kyber
track = tracks/hum.wav
style = config chaos_inferno
style = config chaos_inferno
name = Chaos Inferno
variation = 0

# ---- Preset 9: Smoke Laser (beam through rolling smoke) ----
# Uses [smoke_laser] from blade_styles.ini: a solid green laser dimmed
# by two independent fire layers in MULTIPLY blend, simulating smoke
# drifting across the beam. Darker patches roll along the blade as the
# fire's heat patterns propagate. A faint warm fire adds scattered light,
# and blast flashes punch through the haze. Five layers total.
# See the section comments in blade_styles.ini for per-layer details.
new_preset
font = Kyber
track = tracks/hum.wav
style = config smoke_laser
style = config smoke_laser
name = Smoke Laser
variation = 0

# ---- Preset 10: Mystic Awakening (preon glow + postoff wipe) ----
# Uses [mystic_awakening] from blade_styles.ini. A blue preon glow
# whose brightness follows the preon sound volume, then a red postoff
# wipe retracts from tip to hilt over the postoff sound duration.
#
# WHAT YOU'LL SEE:
#   Press button → blue glow pulsates with preon sound volume (duration
#   matches preon sound file) → preon ends → cyan blade ignites →
#   normal cyan blade with white clash and blast → press off → blade
#   retracts (800ms) → red wipe sweeps tip→hilt (over postoff sound
#   duration) → LEDs off.
#
# The preon and postoff layers are invisible during normal on/off use.
# Four layers: standard cyan + blast + preon_glow + postoff_wipe.
# See [mystic_awakening] in blade_styles.ini for per-layer details.
new_preset
font = Kyber
track = tracks/hum.wav
style = config mystic_awakening
style = config mystic_awakening
name = Mystic Awakening
variation = 0

# ---- Preset 11: Spectral Gate (preon wipe + postoff wipe) ----
# Uses [spectral_gate] from blade_styles.ini. Demonstrates WIPE-based
# preon/postoff: a green wipe previews the blade path before ignition,
# and white drains tip→hilt after shutdown. Both automatically match
# the sound file duration.
#
# WHAT YOU'LL SEE:
#   Press button → green wipe sweeps hilt→tip (over preon sound duration)
#   → preon ends → green blade ignites → normal operation → blade
#   retracts → white wipe drains tip→hilt (over postoff sound duration)
#   → LEDs off.
#
# Four layers: standard green + blast + preon_wipe + postoff_wipe.
# See [spectral_gate] in blade_styles.ini for per-layer details.
new_preset
font = Kyber
track = tracks/hum.wav
style = config spectral_gate
style = config spectral_gate
name = Spectral Gate
variation = 0

# ---- Preset 12: Inferno Ritual (fire + preon + postoff) ----
# Uses [inferno_ritual] from blade_styles.ini. Shows how preon/postoff
# work with fire (which has no built-in on/off animation). The preon
# creates an audio-reactive orange glow (like a pilot light warming up),
# and the postoff wipes red embers from tip to hilt.
#
# WHAT YOU'LL SEE:
#   Press button → orange glow pulsates with preon sound volume (over
#   preon sound duration) → preon ends → fire ignites → rolling
#   red/yellow flames → press off → fire goes out → red wipe retracts
#   tip→hilt (over postoff sound duration) → LEDs off.
#
# Four layers: fire + blast + preon_glow + postoff_wipe.
# See [inferno_ritual] in blade_styles.ini for per-layer details.
new_preset
font = Kyber
track = tracks/hum.wav
style = config inferno_ritual
style = config inferno_ritual
name = Inferno Ritual
variation = 0

# ---- Preset 13: Sputter Gate (audio-reactive preon + postoff) ----
# Uses [sputter_gate] from blade_styles.ini. Demonstrates the audio-reactive
# sputter styles: the blade extends/retracts from the hilt proportional to
# the preon/postoff sound intensity, creating a chaotic sputtering effect.
# Duration automatically matches the sound file length via WavLen.
#
# Unlike preon_glow (uniform brightness) or preon_wipe (linear sweep),
# preon_sputter varies BLADE LENGTH based on audio — loud moments push the
# blade out, quiet moments pull it back. The smoothed audio envelope makes
# the tip boundary follow the sound's volume contour.
#
# WHAT YOU'LL SEE:
#   Press button → blue sputter extends chaotically from hilt, tracking the
#   preon sound volume in real time (runs for full preon sound duration) →
#   preon sound ends → cyan blade ignites (300ms) → normal cyan blade with
#   white blast → press off → blade retracts (800ms) → red sputter appears,
#   extending/retracting with postoff sound volume (runs for full postoff
#   sound duration) → postoff sound ends → LEDs off.
#
# Four layers: standard cyan + blast + preon_sputter + postoff_sputter.
# See [sputter_gate] in blade_styles.ini for per-layer details.
new_preset
font = Kyber
track = tracks/hum.wav
style = config sputter_gate
style = config sputter_gate
name = Sputter Gate
variation = 0

# ---- Required: end of preset list ----
end
